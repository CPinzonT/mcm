x-laravel-env: &laravel-env
    DB_CONNECTION: ${DOCKER_DB_CONNECTION:-mysql}
    DB_HOST: ${DOCKER_DB_HOST:-mysql}
    DB_PORT: ${DOCKER_DB_PORT:-3306}
    DB_DATABASE: ${DOCKER_DB_DATABASE:-mcm}
    DB_USERNAME: ${DOCKER_DB_USERNAME:-mcm}
    DB_PASSWORD: ${DOCKER_DB_PASSWORD:-change_me}
    REDIS_HOST: ${DOCKER_REDIS_HOST:-redis}
    REDIS_PORT: ${DOCKER_REDIS_PORT:-6379}
    REDIS_PASSWORD: ${DOCKER_REDIS_PASSWORD:-null}

services:
    web:
        build:
            context: .
            dockerfile: Dockerfile
        image: mcm-app:latest
        container_name: mcm-web
        env_file:
            - .env
        environment:
            <<: *laravel-env
            RUN_MIGRATIONS: "true"
            RUN_SEEDERS: "true"
        ports:
            - "${APP_PORT:-80}:80"
        volumes:
            - storage_data:/var/www/html/storage
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_healthy
        restart: unless-stopped
        init: true
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost/up"]
            interval: 30s
            timeout: 5s
            retries: 5
            start_period: 20s

    worker:
        image: mcm-app:latest
        container_name: mcm-worker
        env_file:
            - .env
        environment: *laravel-env
        command: ["worker"]
        volumes:
            - storage_data:/var/www/html/storage
        depends_on:
            web:
                condition: service_healthy
            mysql:
                condition: service_healthy
            redis:
                condition: service_healthy
        restart: unless-stopped
        init: true

    scheduler:
        image: mcm-app:latest
        container_name: mcm-scheduler
        env_file:
            - .env
        environment: *laravel-env
        command: ["scheduler"]
        volumes:
            - storage_data:/var/www/html/storage
        depends_on:
            web:
                condition: service_healthy
            mysql:
                condition: service_healthy
            redis:
                condition: service_healthy
        restart: unless-stopped
        init: true

    mysql:
        image: mysql:8.4
        container_name: mcm-mysql
        environment:
            MYSQL_DATABASE: ${DOCKER_DB_DATABASE:-mcm}
            MYSQL_USER: ${DOCKER_DB_USERNAME:-mcm}
            MYSQL_PASSWORD: ${DOCKER_DB_PASSWORD:-change_me}
            MYSQL_ROOT_PASSWORD: ${DOCKER_DB_ROOT_PASSWORD:-change_root_password}
        command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
        ports:
            - "3306:3306"
        volumes:
            - mysql_data:/var/lib/mysql
        restart: unless-stopped
        healthcheck:
            test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 30s
        

    redis:
        image: redis:7-alpine
        container_name: mcm-redis
        command: ["redis-server", "--appendonly", "yes"]
        volumes:
            - redis_data:/data
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 10

volumes:
    storage_data:
    mysql_data:
    redis_data:
